name: Deploy Project

on:
  release:
    types: [ published ]

jobs:
  compile:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup project environment
        uses: ./.github/actions/setup

      - name: Build with Gradle
        run: ./gradlew compileDebugSources

  test:
    runs-on: macos-latest
    needs: compile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup project environment
        uses: ./.github/actions/setup

      - name: Run tests with Gradle
        run: ./gradlew test

  lint:
    runs-on: macos-latest
    needs: compile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup project environment
        uses: ./.github/actions/setup

      - name: Run lint with Gradle
        run: ./gradlew lint

  build:
    environment:
      name: Production
    runs-on: macos-latest
    needs: [ compile, test, lint ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup project environment
        uses: ./.github/actions/setup

      - name: Get version name
        id: version_name
        run: |
          source scripts/version_utils.sh
          VERSION_NAME=$(sanitize_version_name "$VERSION_NAME)")
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        env:
          VERSION_NAME: ${{ github.event.release.tag_name }}

      - name: Build APK with Gradle
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ env.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version_name.outputs.version_name }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-v${{ steps.version_name.outputs.version_name }}
          if-no-files-found: error
          path: |
            ./**/*.apk
            ./**/*.aab

      - name: Increment version code
        run: |
          INCREMENTED_VERSION_CODE=$((VERSION_CODE + 1))
          echo "VERSION_CODE=${INCREMENTED_VERSION_CODE}" >> $GITHUB_ENV
        env:
          VERSION_CODE: ${{ env.VERSION_CODE }}
